<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kotai DEX · Notas de Atualização</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #050714;
    --bg-card: rgba(10, 15, 42, 0.75);
    --bg-card-solid: #0a0f2a;
    --border: rgba(72, 96, 200, 0.28);
    --border-strong: rgba(91, 140, 255, 0.5);
    --grid-line: rgba(46, 64, 150, 0.18);
    --text: #eef1fb;
    --text-muted: #8a93b8;
    --blue: #5b8cff;
    --blue-light: #a8c6ff;
    --teal: #2dd4a0;
    --purple: #a06bff;
    --magenta: #d44fd0;
    --glow-blue: rgba(91, 140, 255, 0.35);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background-color: var(--bg);
    color: var(--text);
    font-family: 'Inter', system-ui, sans-serif;
    line-height: 1.6;
    min-height: 100vh;
    background-image:
      linear-gradient(var(--grid-line) 1px, transparent 1px),
      linear-gradient(90deg, var(--grid-line) 1px, transparent 1px);
    background-size: 56px 56px;
    position: relative;
    overflow-x: hidden;
  }
  body::before {
    content: '';
    position: fixed;
    top: -300px; left: 50%;
    transform: translateX(-50%);
    width: 900px; height: 600px;
    background: radial-gradient(ellipse, rgba(91,140,255,0.13) 0%, transparent 65%);
    pointer-events: none;
    z-index: 0;
  }
  body::after {
    content: '';
    position: fixed;
    bottom: -350px; right: -200px;
    width: 800px; height: 700px;
    background: radial-gradient(ellipse, rgba(160,107,255,0.08) 0%, transparent 65%);
    pointer-events: none;
    z-index: 0;
  }

  .wrap {
    max-width: 920px;
    margin: 0 auto;
    padding: 56px 24px 96px;
    position: relative;
    z-index: 1;
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 48px;
  }
  .logo-mark {
    width: 42px; height: 42px;
    border-radius: 12px;
    display: grid;
    place-items: center;
    background: linear-gradient(135deg, var(--magenta) 0%, var(--purple) 45%, var(--blue) 100%);
    font-family: 'Space Grotesk', sans-serif;
    font-weight: 700;
    font-size: 24px;
    color: #fff;
    font-style: italic;
    box-shadow: 0 0 24px rgba(160, 107, 255, 0.45);
  }
  .logo-text {
    font-family: 'Space Grotesk', sans-serif;
    font-weight: 700;
    font-size: 22px;
    letter-spacing: 0.06em;
  }
  .logo-text .dex {
    background: linear-gradient(90deg, var(--blue) 0%, #4dd6e8 100%);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
  }

  .hero { margin-bottom: 40px; }
  .release-badge {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 7px 18px;
    border-radius: 999px;
    border: 1px solid var(--border-strong);
    background: rgba(91, 140, 255, 0.08);
    color: var(--blue-light);
    font-size: 13.5px;
    font-weight: 600;
    letter-spacing: 0.04em;
    margin-bottom: 22px;
  }
  .release-badge .dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--teal);
    box-shadow: 0 0 8px var(--teal);
  }
  h1 {
    font-family: 'Space Grotesk', sans-serif;
    font-size: clamp(30px, 5vw, 44px);
    font-weight: 700;
    line-height: 1.15;
    margin-bottom: 14px;
  }
  h1 .highlight {
    background: linear-gradient(90deg, var(--blue) 0%, var(--blue-light) 100%);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
  }
  .subtitle {
    color: var(--text-muted);
    font-size: 17px;
    max-width: 620px;
  }

  /* ---------- lista de releases ---------- */
  .list {
    display: flex;
    flex-direction: column;
    gap: 14px;
  }

  .release {
    display: flex;
    align-items: center;
    gap: 22px;
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 18px;
    padding: 22px 26px;
    backdrop-filter: blur(8px);
    text-decoration: none;
    color: inherit;
    transition: border-color .2s ease, transform .2s ease, box-shadow .2s ease;
  }
  .release:hover {
    border-color: var(--border-strong);
    transform: translateY(-3px);
    box-shadow: 0 18px 50px -22px var(--glow-blue);
  }

  .release-date {
    flex-shrink: 0;
    width: 92px;
    text-align: center;
    border-right: 1px solid var(--border);
    padding-right: 22px;
  }
  .release-date .day {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 30px;
    font-weight: 700;
    line-height: 1;
    color: var(--blue-light);
  }
  .release-date .my {
    font-size: 12.5px;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    margin-top: 6px;
  }

  .release-main { flex: 1; min-width: 0; }
  .release-top {
    display: flex;
    align-items: center;
    gap: 10px;
    flex-wrap: wrap;
    margin-bottom: 5px;
  }
  .release-version {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 18px;
    font-weight: 600;
  }
  .release-tag {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    padding: 3px 9px;
    border-radius: 999px;
    border: 1px solid var(--border-strong);
    background: rgba(91, 140, 255, 0.1);
    color: var(--blue-light);
  }
  .release-desc {
    color: var(--text-muted);
    font-size: 14.5px;
    margin-bottom: 12px;
  }
  .counts {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }
  .count {
    font-size: 12px;
    font-weight: 600;
    padding: 3px 10px;
    border-radius: 999px;
    border: 1px solid var(--border);
  }
  .count.novo { color: var(--teal); border-color: rgba(45, 212, 160, 0.4); background: rgba(45, 212, 160, 0.08); }
  .count.melhoria { color: var(--blue-light); border-color: rgba(91, 140, 255, 0.45); background: rgba(91, 140, 255, 0.1); }
  .count.correcao { color: #c4a6ff; border-color: rgba(160, 107, 255, 0.4); background: rgba(160, 107, 255, 0.09); }

  .chevron {
    flex-shrink: 0;
    font-size: 22px;
    color: var(--text-muted);
    transition: transform .2s ease, color .2s ease;
  }
  .release:hover .chevron {
    transform: translateX(4px);
    color: var(--blue-light);
  }

  footer {
    text-align: center;
    margin-top: 64px;
    color: var(--text-muted);
    font-size: 13.5px;
  }
  footer .line {
    width: 120px; height: 1px;
    margin: 0 auto 20px;
    background: linear-gradient(90deg, transparent, var(--border-strong), transparent);
  }

  @media (max-width: 640px) {
    body { background-size: 40px 40px; }
    .wrap { padding: 32px 16px 64px; }
    .logo { margin-bottom: 32px; }
    .release { gap: 16px; padding: 18px; }
    .release-date { width: 64px; padding-right: 16px; }
    .release-date .day { font-size: 24px; }
    .release-date .my { font-size: 11px; }
    .release-version { font-size: 16px; }
    .release-desc { font-size: 13.5px; }
    .chevron { display: none; }
  }
</style>
</head>
<body>
<div class="wrap">

  <div class="logo">
    <div class="logo-mark">K</div>
    <div class="logo-text">KOTAI <span class="dex">DEX</span></div>
  </div>

  <div class="hero">
    <div class="release-badge"><span class="dot"></span>Histórico de releases</div>
    <h1>Notas de <span class="highlight">Atualização</span></h1>
    <p class="subtitle">Cada release que sobe pra plataforma fica registrado aqui. Clique numa linha para ver as notas daquela atualização.</p>
  </div>

  <div class="list" id="list"></div>

  <footer>
    <div class="line"></div>
    Kotai DEX · Notas de Atualização
  </footer>

</div>

<script>
  // Lista de releases, do mais recente para o mais antigo.
  // Para registrar uma nova atualização, adicione um objeto no TOPO deste array.
  const releases = [
    {
      date: '2026-06-12',
      version: 'Release · 12 de junho de 2026',
      tag: 'Atual',
      desc: 'Novidades, melhorias e correções que chegaram à plataforma neste ciclo.',
      counts: { novo: 4, melhoria: 4, correcao: 10 },
      link: 'galeria.html',
    },
  ];

  const MESES = ['JAN', 'FEV', 'MAR', 'ABR', 'MAI', 'JUN', 'JUL', 'AGO', 'SET', 'OUT', 'NOV', 'DEZ'];

  // Garante a ordem do mais recente para o mais antigo.
  releases.sort((a, b) => b.date.localeCompare(a.date));

  const list = document.getElementById('list');
  releases.forEach((r) => {
    const [year, month, day] = r.date.split('-').map(Number);
    const a = document.createElement('a');
    a.className = 'release';
    a.href = r.link;
    a.innerHTML = `
      <div class="release-date">
        <div class="day">${String(day).padStart(2, '0')}</div>
        <div class="my">${MESES[month - 1]} ${year}</div>
      </div>
      <div class="release-main">
        <div class="release-top">
          <span class="release-version">${r.version}</span>
          ${r.tag ? `<span class="release-tag">${r.tag}</span>` : ''}
        </div>
        <div class="release-desc">${r.desc}</div>
        <div class="counts">
          <span class="count novo">${r.counts.novo} novidades</span>
          <span class="count melhoria">${r.counts.melhoria} melhorias</span>
          <span class="count correcao">${r.counts.correcao} correções</span>
        </div>
      </div>
      <div class="chevron">›</div>`;
    list.appendChild(a);
  });
</script>
</body>
</html>
